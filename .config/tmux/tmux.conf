##### GENERAL #####
set -g mouse on
set -g base-index 1
set -g pane-base-index 1
set -g repeat-time 1000
set -g history-limit 10000
set -g renumber-windows on

##### VI MODE #####
set-window-option -g mode-keys vi
bind 'p' paste-buffer
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi y send-keys -X copy-selection
bind-key -T copy-mode-vi r send-keys -X rectangle-toggle

##### VIM NAVIGATION #####
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

##### PREFIX #####
unbind C-b
set -g prefix C-Space
bind C-Space send-prefix

##### SYNC PANES #####
bind-key g set-window-option synchronize-panes\; display-message "synchronize-panes is now #{?pane_synchronized,on,off}"

##### TERMINAL #####
set -g default-terminal "tmux-256color"
set -sg terminal-overrides ",*:RGB"

##### PLUGINS #####
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'egel/tmux-gruvbox'
set -g @plugin 'thewtex/tmux-mem-cpu-load'

##### GRUVBOX THEME #####
set -g @tmux-gruvbox 'dark'
set -g @tmux-gruvbox-statusbar-alpha 'true'
set -g @tmux-gruvbox-left-status-a '#S'
set -g @tmux-gruvbox-right-status-x '%d/%m/%Y'

##### ACTIVE WINDOW FONT WHITE #####
set -g window-status-current-style "fg=#ffffff"

##### STATUS BAR EXTRAS #####
set -g status-interval 2
set -g status-right "#[fg=#8ec07c]#(tmux-mem-cpu-load --colors --interval 2)"

##### TPM (MUST BE LAST) #####
run '~/.config/tmux/plugins/tpm/tpm'
